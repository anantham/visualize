<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sense of Scale — numbers too big to feel</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0f17;
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #dbe4f0; }
  canvas { display: block; position: fixed; inset: 0; }

  #panel { position: fixed; top: 16px; left: 16px; width: 330px; z-index: 10;
    background: rgba(13, 19, 30, 0.86); border: 1px solid rgba(122, 150, 200, 0.18);
    border-radius: 14px; padding: 14px 18px 12px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45); }
  .brand { font-size: 10px; color: #516180; letter-spacing: 0.4px;
    display: flex; justify-content: space-between; margin-bottom: 6px; }
  #panel h1 { font-size: 16px; margin: 0 0 6px; }
  #stage-copy { font-size: 12px; color: #9fb2cf; margin: 0 0 10px; line-height: 1.55; }
  #stage-copy b { color: #c9d6ea; }

  #task { display: flex; gap: 8px; align-items: baseline; font-size: 12px;
    color: #cfdcf2; background: rgba(96, 165, 250, 0.07);
    border: 1px solid rgba(96, 165, 250, 0.22); border-radius: 9px;
    padding: 8px 10px; margin: 0 0 10px; line-height: 1.45; }
  #task .tick { flex: none; color: #64789a; font-weight: 700; }
  #task.done { border-color: rgba(52, 211, 153, 0.45); background: rgba(52, 211, 153, 0.08); }
  #task.done .tick { color: #34d399; }

  .ctl { margin: 8px 0; }
  .ctl[hidden] { display: none; }
  .row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .row label { width: 78px; flex: none; color: #9fb2cf; }
  .row input[type="range"] { flex: 1; accent-color: #60a5fa; }
  .row .val { width: 64px; flex: none; text-align: right;
    font-variant-numeric: tabular-nums; font-weight: 600; }
  .status { font-size: 11.5px; color: #7fd1f9; margin: 6px 0 0;
    font-variant-numeric: tabular-nums; min-height: 14px; line-height: 1.4; }

  .btn { background: #1c2a40; border: 1px solid rgba(122, 150, 200, 0.25);
    color: #dbe4f0; border-radius: 8px; padding: 5px 11px; font-size: 12px;
    cursor: pointer; margin: 2px 4px 2px 0; }
  .btn:hover { background: #25364f; }
  .btn.on { border-color: rgba(244, 114, 182, 0.65); color: #f9c1dd; }
  .btn.primary { border-color: rgba(96, 165, 250, 0.5); }

  .nav { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .nav .spacer { flex: 1; }
  #next.glow { border-color: rgba(52, 211, 153, 0.7);
    box-shadow: 0 0 12px rgba(52, 211, 153, 0.35); }
  #skip { font-size: 10.5px; color: #64789a; text-decoration: none; }
  #skip:hover { color: #9fb2cf; text-decoration: underline; }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="panel">
  <div class="brand"><span>visualize · project 4</span><span id="stage-num"></span></div>
  <h1 id="stage-title"></h1>
  <p id="stage-copy"></p>
  <div id="task"><span class="tick" id="task-tick">○</span><span id="task-text"></span></div>

  <div class="ctl" id="ctl-race" hidden>
    <div class="row">
      <label for="cam">time speed</label>
      <input type="range" id="cam" min="0" max="3.7" step="0.01" value="0">
      <span class="val" id="cam-val">1×</span>
    </div>
    <button class="btn" id="race-reset">restart race</button>
    <div class="status" id="race-status"></div>
  </div>

  <div class="ctl" id="ctl-zoom" hidden>
    <div class="row">
      <label for="zoom">view width</label>
      <input type="range" id="zoom" min="-16" max="27.5" step="0.02" value="1">

    </div>
    <div class="status">scroll on the canvas also zooms</div>
  </div>

  <div class="ctl" id="ctl-units" hidden>
    <div id="unit-buttons"></div>
    <div class="status" id="count-status"></div>
  </div>

  <div class="ctl" id="ctl-ring" hidden>
    <button class="btn on" id="ring-clock">train clock</button>
    <button class="btn" id="ring-week">weekdays</button>
    <div class="status">drag the hand</div>
  </div>

  <div class="ctl" id="ctl-rain" hidden>
    <div class="row">
      <label for="rain-rate">how hard</label>
      <input type="range" id="rain-rate" min="-0.7" max="2.2" step="0.01" value="1.2">
      <span class="val" id="rain-rate-val"></span>
    </div>
    <div class="status" id="rain-feel" style="color:#7fc8a9"></div>
    <div style="margin-top:6px">
      <button class="btn primary" id="rain-go">let it rain</button>
      <button class="btn" id="rain-reset">reset</button>
    </div>
    <div style="margin-top:4px">
      <button class="btn on" id="roof-house">🏠 your roof</button>
      <button class="btn" id="roof-pitch">⚽ a pitch</button>
    </div>
    <div class="status" id="rain-status">drag the water level, or let it rain</div>
  </div>

  <div class="ctl" id="ctl-pour" hidden>
    <div style="font-size:11px;color:#9fb2cf;margin-bottom:4px">pick a real amount:</div>
    <div id="pour-things"></div>
    <div style="font-size:11px;color:#9fb2cf;margin:9px 0 4px">measure it in:</div>
    <div id="pour-vessels"></div>
    <div class="status" id="pour-status"></div>
  </div>

  <div class="ctl" id="ctl-game" hidden>
    <div class="row">
      <label>your guess</label>
      <input type="range" id="guess" min="0" max="6" step="0.02" value="1">
      <span class="val" id="guess-val">10</span>
    </div>
    <button class="btn primary" id="lock">lock it in</button>
    <button class="btn" id="game-next" hidden>next question</button>
    <div class="status" id="game-status"></div>
  </div>

  <div class="ctl" id="ctl-pg" hidden>
    <button class="btn" id="pg-back" hidden>⟵ back to the index</button>
    <button class="btn" id="pg-unit" hidden>try a different unit</button>
    <div class="status" id="pg-status">click any dot to open it in its natural view</div>
  </div>

  <div class="nav">
    <button class="btn" id="back">← Back</button>
    <button class="btn" id="next">Next →</button>
    <span class="spacer"></span>
    <a id="skip" href="#9">skip to the index</a>
  </div>
</div>

// === formatting =======================================================================
const SUP = { '-': '⁻', 0: '⁰', 1: '¹', 2: '²', 3: '³', 4: '⁴', 5: '⁵', 6: '⁶', 7: '⁷', 8: '⁸', 9: '⁹' };
const sup = (n) => String(n).split('').map((c) => SUP[c] || c).join('');
function fmt(n) {
  if (n === 0) return '0';
  const a = Math.abs(n);
  if (a >= 1e4 || a < 0.01) {
    const e = Math.floor(Math.log10(a));
    const m = n / 10 ** e;
    return `${(+m.toFixed(1)).toLocaleString()} × 10${sup(e)}`;
  }
  if (a >= 100) return Math.round(n).toLocaleString('en-IN');
  return String(+n.toFixed(2));
}
function fmtCount(n) {
  if (n < 1e7 && n >= 1) return Math.round(n) === n || n > 100
    ? Math.round(n).toLocaleString('en-IN') : String(+n.toFixed(2));
  return fmt(n);
}
function indianMoney(v) {
  if (v >= 1e12) return `₹${+(v / 1e12).toFixed(2)} lakh crore`;
  if (v >= 1e7) return `₹${+(v / 1e7).toFixed(2)} crore`;
  if (v >= 1e5) return `₹${+(v / 1e5).toFixed(2)} lakh`;
  return `₹${v.toLocaleString('en-IN')}`;
}
function westernMoney(v) {
  if (v >= 1e12) return `${+(v / 1e12).toFixed(2)} trillion`;
  if (v >= 1e9) return `${+(v / 1e9).toFixed(2)} billion`;
  if (v >= 1e6) return `${+(v / 1e6).toFixed(2)} million`;
  return v.toLocaleString();
}
function fmtMetres(m) {
  if (m >= 9.46e15) {
    const ly = m / 9.46e15;
    if (ly >= 1e9) return `${+(ly / 1e9).toFixed(1)} billion light-years`;
    if (ly >= 1e6) return `${+(ly / 1e6).toFixed(1)} million light-years`;
    if (ly >= 1000) return `${Math.round(ly).toLocaleString('en-IN')} light-years`;
    return `${+ly.toFixed(1)} light-years`;
  }
  if (m >= 1e3) return `${fmt(m / 1e3)} km`;
  if (m >= 1) return `${fmt(m)} m`;
  if (m >= 1e-3) return `${fmt(m * 1e3)} mm`;
  if (m >= 1e-6) return `${fmt(m * 1e6)} µm`;
  if (m >= 1e-9) return `${fmt(m * 1e9)} nm`;
  return `${fmt(m)} m`;
}

// === layout ===========================================================================
let W = 0, H = 0;
function layout() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  cv.style.width = `${W}px`; cv.style.height = `${H}px`;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  dotCache.clear();
}
window.addEventListener('resize', layout);

// === drawing helpers ==================================================================
function text(s, x, y, color = '#8fa3c0', size = 12, align = 'left', weight = 600) {
  ctx.save(); ctx.fillStyle = color; ctx.textAlign = align; ctx.textBaseline = 'middle';
  ctx.font = `${weight} ${size}px ui-sans-serif, system-ui, sans-serif`;
  ctx.fillText(s, x, y); ctx.restore();
}
function line(x1, y1, x2, y2, color, w = 1, alpha = 1) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.strokeStyle = color; ctx.lineWidth = w;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); ctx.restore();
}

// === view: RACE =======================================================================
function camSpeed() { return 10 ** S.camLog; }
function drawRace() {
  const x0 = PANEL_X + 60, x1 = W - 60;
  const trackPx = x1 - x0;
  const lanes = RACERS.length;
  const top = 90, laneH = Math.min(74, (H - top - 60) / lanes);
  text(`a ${TRACK_M} m track · every lane at its true speed`, (x0 + x1) / 2, 44, '#8fa3c0', 13, 'center');
  for (let i = 0; i < lanes; i++) {
    const r = RACERS[i];
    const y = top + i * laneH + laneH / 2;
    line(x0, y, x1, y, '#2a3a55', 1.5);
    line(x0, y - 9, x0, y + 9, '#46618f', 2);
    line(x1, y - 9, x1, y + 9, '#46618f', 2);
    const dist = r.v * S.simT;
    const frac = (dist / TRACK_M) % 1;
    const crossings = Math.floor(dist / TRACK_M);
    const blur = r.v * camSpeed() / TRACK_M > 20; // >20 crossings per real second
    if (blur) {
      ctx.save(); ctx.globalAlpha = 0.35; ctx.fillStyle = '#60a5fa';
      ctx.fillRect(x0, y - 7, trackPx, 14); ctx.restore();
    } else {
      text(r.icon, x0 + frac * trackPx, y - 2, '#fff', 22, 'center');
    }
    text(`${r.label} — ${fmt(r.v)} m/s`, x0, y - laneH * 0.33, '#9fb2cf', 12);
    text(crossings > 0 ? `crossed ×${fmtCount(crossings)}` : '—',
      x1, y - laneH * 0.33, crossings > 0 ? '#34d399' : '#516180', 12, 'right');
  }
}

// === view: ZOOM =======================================================================
function drawZoom() {
  const cx = PANEL_X + (W - PANEL_X) / 2, cy = H / 2;
  const viewW = 10 ** S.z;            // metres across the visible area
  const mPerPx = viewW / (W - PANEL_X);
  if (S.z <= -13.6) S.sawAtom = true;
  if (S.z >= 21) S.sawGalaxy = true;
  const labels = [];
  for (const a of SIZES) {
    const px = a.v / mPerPx;
    if (px < 1.2 || px > (W - PANEL_X) * 12) continue;
    ctx.save();
    ctx.strokeStyle = '#60a5fa';
    ctx.globalAlpha = Math.min(0.9, Math.max(0.15, 1.6 - px / (W - PANEL_X)));
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, px / 2, 0, TAU); ctx.stroke();
    ctx.restore();
    if (px > 22) labels.push({ s: `${a.label} — ${fmtMetres(a.v)}`, top: cy - px / 2 });
  }
  // labels just above each circle, de-colliding downward, on dark chips
  labels.sort((a, b) => a.top - b.top);
  const usedY = [];
  for (const L of labels) {
    let ly = Math.max(26, Math.min(H - 16, L.top - 11));
    while (usedY.some((u) => Math.abs(u - ly) < 15)) ly += 16;
    if (ly > H - 16) continue;
    usedY.push(ly);
    ctx.save();
    ctx.font = '600 12px ui-sans-serif, system-ui, sans-serif';
    const tw = ctx.measureText(L.s).width;
    ctx.fillStyle = 'rgba(11,15,23,0.8)';
    ctx.fillRect(cx - tw / 2 - 6, ly - 9, tw + 12, 18);
    ctx.restore();
    text(L.s, cx, ly, '#9fb2cf', 12, 'center');
  }
  // genuine voids — a caption near the foot of the screen (the rings stay on screen,
  // but the *matter* between them is what's absent)
  for (const vd of VOIDS) {
    if (S.z > vd.zLo && S.z < vd.zHi) {
      text(vd.l1, cx, H - 116, '#7388a8', 13, 'center');
      text(vd.l2, cx, H - 96, '#7388a8', 13, 'center');
    }
  }

  // practical area units as true-scale rectangles (rects first, labels on top)
  const areaLabels = [];
  const usedLabelY = [];
  for (const a of AREAS) {
    const pw = a.w / mPerPx, ph = a.h / mPerPx;
    if (Math.max(pw, ph) < 10 || Math.min(pw, ph) > (W - PANEL_X) * 4) continue;
    ctx.save();
    ctx.strokeStyle = '#fbbf24';
    ctx.globalAlpha = Math.min(0.9, Math.max(0.18, 1.6 - pw / (W - PANEL_X)));
    ctx.lineWidth = 1.5;
    ctx.strokeRect(cx - pw / 2, cy - ph / 2, pw, ph);
    ctx.restore();
    if (pw > 70) {
      let ly = Math.min(H - 52, cy + ph / 2 + 13);
      while (usedLabelY.some((u) => Math.abs(u - ly) < 16)) ly += 17;
      if (ly < H - 36) { areaLabels.push({ label: a.label, ly }); usedLabelY.push(ly); }
    }
  }
  for (const { label: s, ly } of areaLabels) {
    ctx.save();
    ctx.font = '600 11.5px ui-sans-serif, system-ui, sans-serif';
    const tw = ctx.measureText(s).width;
    ctx.fillStyle = 'rgba(11, 15, 23, 0.85)';
    ctx.fillRect(cx - tw / 2 - 6, ly - 9, tw + 12, 18);
    ctx.restore();
    text(s, cx, ly, '#fbbf24', 11.5, 'center');
  }
  text(`your view is ${fmtMetres(viewW)} wide`, cx, H - 36, '#dbe4f0', 15, 'center', 700);
  $('zoom-val').textContent = `10${sup(Math.round(S.z))} m`;
}

function drawNote(x, y, w, h, alpha = 1) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle = '#b48ead'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#0b0f17'; ctx.beginPath();
  ctx.arc(x + w / 2, y + h / 2, h * 0.28, 0, TAU); ctx.fill();
  ctx.restore();
}
function drawCount() {
  if (!S.count) return;
  const { total, units, idx } = S.count;
  const u = units[idx];
  const n = total.v / u.v;
  if (n >= 1e4) S.flags.sawSmear = true;
  if (n <= 100) S.flags.sawCountable = true;

  const ax = PANEL_X + 40, aw = W - PANEL_X - 360, ay = 92, ah = H - 190;
  // caption
  const capParts = total.v >= 1e10 && units[0].v >= 1000
    ? `${indianMoney(total.v)}  =  ${westernMoney(total.v)} rupees`
    : null;
  text(total.label, ax + aw / 2, 40, '#dbe4f0', 15, 'center', 700);
  if (capParts) text(capParts, ax + aw / 2, 62, '#fbbf24', 12.5, 'center');
  text(`= ${fmtCount(n)} × ${u.label}`, ax + aw / 2, capParts ? 82 : 64, '#34d399', 14, 'center', 700);

  if (n <= 400) {
    const cols = Math.ceil(Math.sqrt(n * (aw / ah)));
    const rows = Math.ceil(n / cols);
    const cell = Math.min(aw / cols, ah / rows, 46);
    const ox = ax + (aw - cols * cell) / 2, oy = ay + 26;
    for (let k = 0; k < Math.ceil(n); k++) {
      const x = ox + (k % cols) * cell + cell / 2;
      const y = oy + Math.floor(k / cols) * cell + cell / 2;
      const partial = k + 1 > n ? n - k : 1;
      if (u.glyph === 'note') drawNote(x - cell * 0.36, y - cell * 0.2, cell * 0.72, cell * 0.4, partial);
      else text(u.glyph || '●', x, y, '#dbe4f0', cell * 0.7, 'center');
      if (partial < 1) { // dim overlay marking the fraction
        ctx.save(); ctx.globalAlpha = 1 - partial; ctx.fillStyle = '#0b0f17';
        ctx.fillRect(x - cell / 2 + cell * partial, y - cell / 2, cell * (1 - partial), cell);
        ctx.restore();
        text(`${(+n.toFixed(2))}`, x, y + cell * 0.62, '#9fb2cf', 11, 'center');
      }
    }
  } else if (n <= 5e4) {
    const key = `${total.v}|${u.v}|${aw}x${ah}`;
    if (!dotCache.has(key)) {
      const oc = document.createElement('canvas');
      oc.width = aw; oc.height = ah;
      const c2 = oc.getContext('2d');
      c2.fillStyle = '#b48ead';
      const cols = Math.ceil(Math.sqrt(n * (aw / ah)));
      const cell = aw / cols;
      for (let k = 0; k < n; k++) {
        c2.fillRect((k % cols) * cell, Math.floor(k / cols) * cell, Math.max(1, cell * 0.55), Math.max(1, cell * 0.55));
      }
      dotCache.set(key, oc);
    }
    ctx.drawImage(dotCache.get(key), ax, ay + 26);
    text('still a number — but you stopped counting a while ago', ax + aw / 2, ay + ah + 8, '#9fb2cf', 11.5, 'center');
  } else {
    ctx.save();
    const g = ctx.createLinearGradient(ax, 0, ax + aw, 0);
    g.addColorStop(0, 'rgba(180,142,173,0.85)'); g.addColorStop(1, 'rgba(180,142,173,0.35)');
    ctx.fillStyle = g;
    ctx.fillRect(ax, ay + ah * 0.3, aw, ah * 0.42);
    ctx.restore();
    text('a smear. counting has died.', ax + aw / 2, ay + ah * 0.51, '#0b0f17', 16, 'center', 700);
  }

  // nested tens — the rescue (only needed once counting has failed)
  const nx = W - 290, nw = 240;
  if (n <= 100) {
    text('no rescue needed —', nx + nw / 2, ay + 40, '#34d399', 12.5, 'center');
    text('you can simply count these', nx + nw / 2, ay + 58, '#34d399', 12.5, 'center');
  } else {
    text('the rescue: nested tens', nx + nw / 2, ay - 4, '#8fa3c0', 12, 'center');
    const steps = Math.max(1, Math.ceil(Math.log10(Math.max(n, 1.0001))));
    let side = Math.min(nw, H - ay - 140);
    let y0 = ay + 22, x0 = nx + (nw - side) / 2;
    const levels = Math.min(5, steps);
    for (let l = 0; l < levels; l++) {
      ctx.save(); ctx.strokeStyle = '#fbbf24'; ctx.globalAlpha = 0.85 - l * 0.13;
      ctx.lineWidth = 1.5; ctx.strokeRect(x0, y0, side, side); ctx.restore();
      const val = n / 10 ** l;
      text(l === 0 ? fmtCount(n) : `÷10${l > 1 ? sup(l) : ''} → ${fmtCount(val)}`,
        x0 + side / 2, y0 + 11, '#fbbf24', 10.5, 'center');
      const ns = side / Math.sqrt(10);
      x0 += (side - ns) / 2; y0 += (side - ns) * 0.72; side = ns;
    }
    text(`${steps} nested step${steps === 1 ? '' : 's'} of ÷10 reach a single unit`,
      nx + nw / 2, H - 64, '#9fb2cf', 11, 'center');
  }
  $('count-status').textContent = `count: ${fmtCount(n)}`;
}

// === view: RING =======================================================================
function ringGeom() {
  const cx = PANEL_X + (W - PANEL_X) / 2, cy = H / 2 - 20;
  return { cx, cy, R: Math.min((W - PANEL_X) / 2 - 80, H / 2 - 110) };
}
function label12(h) {
  const x = ((h % 24) + 24) % 24;
  if (x === 0) return '12 am'; if (x === 12) return '12 pm';
  return x < 12 ? `${x} am` : `${x - 12} pm`;
}
function drawRing(now) {
  const { cx, cy, R } = ringGeom();
  ctx.save(); ctx.strokeStyle = '#2a3a55'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.72, 0, TAU); ctx.stroke();
  ctx.restore();
  if (S.ring === 'clock') {
    for (let h = 1; h <= 24; h++) {
      const a = (h / 24) * TAU - Math.PI / 2;
      const big = h % 3 === 0;
      text(`${h}`, cx + Math.cos(a) * (R + 22), cy + Math.sin(a) * (R + 22),
        big ? '#dbe4f0' : '#64789a', big ? 14 : 11, 'center');
      text(label12(h), cx + Math.cos(a) * R * 0.585, cy + Math.sin(a) * R * 0.585,
        big ? '#7fd1f9' : '#46618f', big ? 11.5 : 9.5, 'center');
      line(cx + Math.cos(a) * R * 0.97, cy + Math.sin(a) * R * 0.97,
        cx + Math.cos(a) * R, cy + Math.sin(a) * R, '#46618f', big ? 2 : 1);
    }
    const ha = (S.hand / 24) * TAU - Math.PI / 2;
    line(cx, cy, cx + Math.cos(ha) * R * 0.86, cy + Math.sin(ha) * R * 0.86, '#f472b6', 3);
    const hr = Math.round(S.hand);
    text(`${String(hr).padStart(2, '0')}:00  =  ${label12(hr)}`, cx, cy + R + 56, '#dbe4f0', 17, 'center', 700);
  } else {
    for (let d = 0; d < 7; d++) {
      const a = (d / 7) * TAU - Math.PI / 2;
      const sel = d === S.day;

let draggingHand = false;

// === view: POUR (practical volume) ====================================================

}
function fmtN(n) {

}
function setPourThing(i) {

function drawVessel(cx, topY, w, h, fill) {
  const fh = h * Math.max(0, Math.min(1, fill));
  ctx.save();
  ctx.fillStyle = 'rgba(80,150,235,0.55)';
  ctx.fillRect(cx - w / 2, topY + h - fh, w, fh);

function drawPour() {
  const t = POUR.things[S.pour.thing];

  const n = t.ml / unit.ml;
  const cx = PANEL_X + (W - PANEL_X) / 2;

    cx, 104, '#34d399', 19, 'center', 700);

    const cols = Math.max(1, Math.min(total, Math.round(Math.sqrt(total * (aw / ah) * 1.6))));
    const rows = Math.ceil(total / cols);
    const cw = Math.min(aw / cols, 150), chh = Math.min(ah / rows, 190);
    const vw = Math.max(10, Math.min(cw * 0.55, chh * 0.42)), vh = vw * 1.45;
    const ox = ax + (aw - cols * cw) / 2, oy = ay;
    for (let k = 0; k < total; k++) {
      const gx = ox + (k % cols) * cw + cw / 2;
      const gy = oy + Math.floor(k / cols) * chh + (chh - vh) / 2;
      const fill = k < full ? 1 : (k === full ? frac : 0);
      drawVessel(gx, gy, vw, vh, fill);

      cx, H - 54, '#64789a', 11.5, 'center');

// === view: RAIN (depth on your body, runoff off your roof) ============================
let draggingWater = false;
function rateFeel(hr) {

}
function depthFeel(mm) {

function fmtStormTime(h) {

}
function rainGeom() {

  return {
    gaugeW, gxc, gy0, gy1, topMM,

    mmToY: (mm) => gy1 - (mm / topMM) * (gy1 - gy0),

}
function drawHuman(cx, footY, headY) {

const indexHits = [];

function openFromIndex(hit) {

      if (d < bd) { bd = d; best = i; }

    S.pour = { thing: best, unit: null };

  } else if (cat.view === 'rain') {

  } else {

    S.pg = { view: 'count', cat, anchor: a };
    setCount({ v: a.v, label: a.label }, units.map((u) => ({ v: u.v, label: u.label })),
      Math.max(0, units.length - 1));

  if (view === 'rain') {
    const g = rainGeom();
    if (e.clientX > g.left - 26 && e.clientX < g.right + 26 && e.clientY > g.gy0 - 10 && e.clientY < g.gy1 + 10) {
      draggingWater = true;
      if (S.rain.raining) { S.rain.raining = false; $('rain-go').classList.remove('on'); $('rain-go').textContent = 'let it rain'; }
      S.rain.depth = g.yToMM(e.clientY);
    }
  }
  if (view === 'index') {
    const hit = indexHits.find((h) => (e.clientX - h.x) ** 2 + (e.clientY - h.y) ** 2 < 144);
    if (hit) openFromIndex(hit);
  }
});
window.addEventListener('pointermove', (e) => {
  if (draggingHand) { ringPointer(e, false); return; }
  if (draggingWater) { S.rain.depth = rainGeom().yToMM(e.clientY); return; }
  if (currentView() === 'index') {
    hoverHit = indexHits.find((h) => (e.clientX - h.x) ** 2 + (e.clientY - h.y) ** 2 < 144) || null;
    cv.style.cursor = hoverHit ? 'pointer' : '';
  }
});
window.addEventListener('pointerup', () => { draggingHand = false; draggingWater = false; });
cv.addEventListener('wheel', (e) => {
  if (currentView() !== 'zoom') return;
  e.preventDefault();
  S.z = Math.max(-16, Math.min(27.5, S.z + e.deltaY * 0.0025));
  $('zoom').value = S.z;
}, { passive: false });

// === controls =========================================================================
$('cam').addEventListener('input', (e) => {
  S.camLog = +e.target.value;
  $('cam-val').textContent = `${fmtCount(10 ** S.camLog)}×`;
});
$('race-reset').addEventListener('click', () => { S.simT = 0; });
$('zoom').addEventListener('input', (e) => { S.z = +e.target.value; });
$('ring-clock').addEventListener('click', () => {
  S.ring = 'clock';
  $('ring-clock').classList.add('on'); $('ring-week').classList.remove('on');
});
$('ring-week').addEventListener('click', () => {
  S.ring = 'week';
  $('ring-week').classList.add('on'); $('ring-clock').classList.remove('on');
});
$('rain-rate').addEventListener('input', (e) => { S.rain.rate = 10 ** (+e.target.value); updateRainLabels(); });
$('rain-go').addEventListener('click', () => {
  S.rain.raining = !S.rain.raining;
  $('rain-go').classList.toggle('on', S.rain.raining);
  $('rain-go').textContent = S.rain.raining ? 'raining…' : 'let it rain';
});
$('rain-reset').addEventListener('click', () => {
  S.rain.depth = 0; S.rain.stormH = 0; S.rain.raining = false;
  $('rain-go').classList.remove('on'); $('rain-go').textContent = 'let it rain';
});
$('roof-house').addEventListener('click', () => {
  S.rain.roof = 100; $('roof-house').classList.add('on'); $('roof-pitch').classList.remove('on');
});
$('roof-pitch').addEventListener('click', () => {
  S.rain.roof = 7140; $('roof-pitch').classList.add('on'); $('roof-house').classList.remove('on');
});

// === stage machinery ==================================================================
function isPlayground() { return STAGES[stage] && STAGES[stage].view === 'pg'; }
function currentView() {
  if (isPlayground()) return S.pg.view;
  return STAGES[stage].view;
}
function setStage(i) {
  stage = Math.max(0, Math.min(STAGES.length - 1, i));
  const st = STAGES[stage];
  taskDone = false;
  st.enter();
  ['race', 'zoom', 'units', 'ring', 'pour', 'rain', 'game', 'pg'].forEach((k) => {
    $(`ctl-${k}`).hidden = !st.reveals.includes(k);
  });
  $('lock').hidden = false;
  $('stage-num').textContent = `${stage + 1} / ${STAGES.length}`;
  $('stage-title').textContent = st.title;
  $('stage-copy').innerHTML = st.copy;
  $('task').style.display = st.task ? '' : 'none';
  if (st.task) $('task-text').textContent = st.task;
  $('back').disabled = stage === 0;
  $('next').style.visibility = stage === STAGES.length - 1 ? 'hidden' : '';
  $('skip').style.visibility = stage === STAGES.length - 1 ? 'hidden' : '';
  if (`#${stage}` !== location.hash) history.replaceState(null, '', `#${stage}`);
}
$('back').addEventListener('click', () => setStage(stage - 1));
$('next').addEventListener('click', () => setStage(stage + 1));
window.addEventListener('hashchange', () => {
  const n = parseInt(location.hash.slice(1), 10);
  if (!Number.isNaN(n) && n !== stage) setStage(n);
});

// === testing hooks ====================================================================
window.__viz = {
  state() {
    return {
      stage, taskDone, view: currentView(),
      simT: +S.simT.toFixed(2), cam: 10 ** S.camLog,
      snailCross: Math.floor(0.013 * S.simT / TRACK_M),
      z: +S.z.toFixed(2), sawAtom: S.sawAtom, sawGalaxy: S.sawGalaxy,
      count: S.count ? +(S.count.total.v / S.count.units[S.count.idx].v).toFixed(3) : null,
      flags: { smear: !!S.flags.sawSmear, countable: !!S.flags.sawCountable,
        seen: S.flags.seen ? S.flags.seen.size : 0 },
      ring: S.ring, hand: S.hand, day: S.day,
      pour: (() => {
        const t = POUR.things[S.pour.thing], u = POUR.vessels[pourUnitIdx()];
        return { thing: t.label, unit: u.label, n: +(t.ml / u.ml).toFixed(3) };
      })(),
      poured: S.flags && S.flags.poured ? S.flags.poured.size : 0,
      rain: { depth: +S.rain.depth.toFixed(1), rate: +S.rain.rate.toFixed(2),
        raining: S.rain.raining, roof: S.rain.roof, stormH: +S.rain.stormH.toFixed(2) },
      game: S.game ? { i: S.game.i, hits: S.game.results.filter((r) => r.hit).length,
        results: S.game.results.length } : null,
      visible: ['race', 'zoom', 'units', 'ring', 'pour', 'rain', 'game', 'pg'].filter((k) => !$(`ctl-${k}`).hidden),
    };
  },
  setCam(log) {
    S.camLog = log; $('cam').value = log;
    $('cam-val').textContent = `${fmtCount(10 ** log)}×`;
  },
  setZ(z) { S.z = z; $('zoom').value = z; },
  zoomCheck(z) {
    const mPerPx = (10 ** z) / (W - PANEL_X);
    const big = (W - PANEL_X) * 12;
    let present = 0, sized = 0;
    for (const a of SIZES) {
      const px = a.v / mPerPx;
      if (px >= 1.2 && px <= big) present++;
      if (px >= 6 && px <= (W - PANEL_X) * 6) sized++;
    }
    for (const a of AREAS) {
      const pw = a.w / mPerPx, ph = a.h / mPerPx;
      if (Math.max(pw, ph) >= 10 && Math.min(pw, ph) <= (W - PANEL_X) * 4) { present++; sized++; }
    }
    const inVoid = VOIDS.some((v) => z > v.zLo && z < v.zHi);
    return { present, sized, inVoid };
  },
  setUnit(i) {
    if (S.count?.appliance !== undefined) setApplianceCount(i);
    else if (S.count) { S.count.idx = i; buildUnitButtons(); }
  },
  setHand(h) { S.hand = h; },
  setRing(r) { S.ring = r; },
  pourThing(i) { setPourThing(i); },
  pourUnit(i) { setPourUnit(i); },
  setRainDepth(mm) { S.rain.depth = mm; },
  setRainRate(hr) { S.rain.rate = hr; $('rain-rate').value = Math.log10(hr); updateRainLabels(); },
  toggleRain() { $('rain-go').click(); },
  setGuess(decades) { $('guess').value = decades; syncGuess(); },
  openIndex(catName, anchorLabel) {
    const cat = INDEX_CATS.find((c) => c.name.startsWith(catName));
    const a = cat.anchors.find((x) => x.label.includes(anchorLabel));
    openFromIndex({ cat, a, x: 0, y: 0 });
  },
  go(i) { setStage(i); },
};

// === boot + main loop =================================================================
layout();
const initial = parseInt(location.hash.slice(1), 10);
setStage(Number.isNaN(initial) ? 0 : initial);

let lastReal = performance.now();
function tick(now) {
  requestAnimationFrame(tick);
  const dt = Math.min((now - lastReal) / 1000, 0.05);
  lastReal = now;
  const view = currentView();
  if (view === 'race') S.simT += dt * camSpeed();
  if (view === 'rain') rainTick(dt);

  ctx.clearRect(0, 0, W, H);
  if (view === 'race') drawRace();
  else if (view === 'zoom') drawZoom();
  else if (view === 'count') drawCount();
  else if (view === 'ring') drawRing(now);
  else if (view === 'pour') drawPour();
  else if (view === 'rain') drawRain(now);
  else if (view === 'game') drawGame();
  else if (view === 'index') drawIndex();

  if (view === 'race') {
    $('race-status').textContent =
      `track time elapsed: ${fmtCount(Math.round(S.simT))} s — the snail needs ${fmtCount(Math.round(TRACK_M / 0.013))} s`;
  }
  const st = STAGES[stage];
  if (!taskDone && st.done && st.done()) taskDone = true;
  $('task').classList.toggle('done', taskDone);
  $('task-tick').textContent = taskDone ? '✓' : '○';
  $('next').classList.toggle('glow', taskDone);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
