<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Triangle Inequality in 3D</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0f17;
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #dbe4f0; }
  #scene { position: fixed; inset: 0; }
  #scene canvas { display: block; }

  #panel { position: fixed; top: 16px; left: 16px; width: 330px; z-index: 10;
    background: rgba(13, 19, 30, 0.86); border: 1px solid rgba(122, 150, 200, 0.18);
    border-radius: 14px; padding: 14px 18px 12px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45); }
  .brand { font-size: 10px; color: #516180; letter-spacing: 0.4px;
    display: flex; justify-content: space-between; margin-bottom: 6px; }
  #panel h1 { font-size: 16px; margin: 0 0 6px; letter-spacing: 0.3px; }
  #stage-copy { font-size: 12px; color: #9fb2cf; margin: 0 0 10px; line-height: 1.55; }
  #stage-copy b { color: #c9d6ea; }

  #task { display: flex; gap: 8px; align-items: baseline; font-size: 12px;
    color: #cfdcf2; background: rgba(96, 165, 250, 0.07);
    border: 1px solid rgba(96, 165, 250, 0.22); border-radius: 9px;
    padding: 8px 10px; margin: 0 0 10px; line-height: 1.45; }
  #task .tick { flex: none; color: #64789a; font-weight: 700; }
  #task.done { border-color: rgba(52, 211, 153, 0.45); background: rgba(52, 211, 153, 0.08); }
  #task.done .tick { color: #34d399; }

  .block[hidden] { display: none; }
  .ctx { font-size: 11px; color: #7fc8a9; font-style: italic; margin: 0 0 8px;
    min-height: 14px; line-height: 1.4; }

  .nav { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .nav .spacer { flex: 1; }
  #next.glow { border-color: rgba(52, 211, 153, 0.7);
    box-shadow: 0 0 12px rgba(52, 211, 153, 0.35); }
  #skip { font-size: 10.5px; color: #64789a; text-decoration: none; }
  #skip:hover { color: #9fb2cf; text-decoration: underline; }

  .nums { font-size: 19px; font-variant-numeric: tabular-nums; margin: 6px 0 10px;
    font-weight: 600; letter-spacing: 0.2px; }
  .c-ab { color: #34d399; } .c-ao { color: #fb923c; } .c-ob { color: #fbbf24; }
  .c-sum { color: #fdba74; }
  .nums .rel { color: #8fa3c0; font-weight: 400; }

  .bar-row { display: flex; align-items: center; gap: 8px; margin: 5px 0;
    font-size: 11px; color: #8fa3c0; }
  .bar-label { width: 40px; text-align: right; flex: none; }
  .bar-track { flex: 1; height: 12px; background: rgba(255, 255, 255, 0.06);
    border-radius: 6px; overflow: hidden; display: flex; }
  .seg { height: 100%; transition: none; }
  .seg-ao { background: #fb923c; }
  .seg-ob { background: #fbbf24; }
  .seg-ab { background: #34d399; }
  .bar-val { width: 36px; flex: none; font-variant-numeric: tabular-nums; }

  #slack-text { font-size: 12px; color: #9fb2cf; margin: 9px 0 4px;
    font-variant-numeric: tabular-nums; }

  #status { display: none; background: rgba(52, 211, 153, 0.12);
    border: 1px solid rgba(52, 211, 153, 0.4); color: #6ee7b7;
    padding: 8px 10px; border-radius: 8px; font-size: 12px; line-height: 1.45;
    margin: 8px 0 4px; }
  body.equal #status { display: block; }
  body.equal .seg-ao, body.equal .seg-ob { background: #34d399; }

  .btn { background: #1c2a40; border: 1px solid rgba(122, 150, 200, 0.25);
    color: #dbe4f0; border-radius: 8px; padding: 6px 12px; font-size: 12px;
    cursor: pointer; margin-right: 6px; }
  .btn:hover { background: #25364f; }
  .btn[disabled] { opacity: 0.35; cursor: default; }

  #labels { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 5; }
  .side-label { position: absolute; left: 0; top: 0; font-size: 12px; font-weight: 600;
    padding: 1px 7px; border-radius: 7px; background: rgba(10, 14, 22, 0.72);
    transform: translate(-50%, -50%); font-variant-numeric: tabular-nums;
    white-space: nowrap; }
  .point-label { position: absolute; left: 0; top: 0; font-size: 13px; font-weight: 700;
    transform: translate(-50%, -100%); text-shadow: 0 1px 4px #000; }

  @media (max-width: 560px) {
    #panel { left: 8px; right: 8px; top: auto; bottom: 8px; width: auto;
      max-height: 46vh; overflow: auto; }
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="scene"></div>
<div id="labels"></div>

<div id="panel">
  <div class="brand"><span>visualize · project 1</span><span id="stage-num"></span></div>
  <h1 id="stage-title"></h1>
  <p id="stage-copy"></p>
  <div id="task"><span class="tick" id="task-tick">○</span><span id="task-text"></span></div>
  <div class="ctx" id="anchor"></div>

  <div class="block" id="block-measure" hidden>
    <div class="nums">
      <span class="c-ab" id="num-ab">–</span><span class="rel"> ≤ </span><span class="c-ao" id="num-ao">–</span><span class="rel"> + </span><span class="c-ob" id="num-ob">–</span><span class="rel"> = </span><span class="c-sum" id="num-sum">–</span>
    </div>
    <div class="bar-row">
      <span class="bar-label">via O</span>
      <div class="bar-track"><div class="seg seg-ao" id="seg-ao"></div><div class="seg seg-ob" id="seg-ob"></div></div>
      <span class="bar-val" id="val-detour">–</span>
    </div>
    <div class="bar-row">
      <span class="bar-label">direct</span>
      <div class="bar-track"><div class="seg seg-ab" id="seg-ab"></div></div>
      <span class="bar-val" id="val-direct">–</span>
    </div>
  </div>

  <div class="block" id="block-slack" hidden>
    <div id="slack-text">–</div>
    <div id="status">Equality — O lies on segment AB. The detour has vanished.</div>
  </div>

  <div class="block" id="block-actions" hidden>
    <button class="btn" id="align">Snap to equality</button>
    <button class="btn" id="reset">Reset</button>
  </div>

  <div class="nav">
    <button class="btn" id="back">← Back</button>
    <button class="btn" id="next">Next →</button>
    <span class="spacer"></span>
    <a id="skip" href="#5">skip to playground</a>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('scene');
const labelLayer = document.getElementById('labels');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0f17);
scene.fog = new THREE.Fog(0x0b0f17, 20, 45);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(6.2, 4.4, 8.2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.6, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxDistance = 30;
controls.minDistance = 2;

scene.add(new THREE.HemisphereLight(0x8899bb, 0x223344, 1.0));
const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(5, 9, 4);
scene.add(sun);

const grid = new THREE.GridHelper(12, 12, 0x2a3a55, 0x16202f);
grid.position.y = 0;
scene.add(grid);

// --- points ---------------------------------------------------------------
const INITIAL = { A: [2.6, 1.8, -1.2], B: [-2.2, 0.9, 1.6] };
const COLORS = { A: 0x60a5fa, B: 0xf472b6, O: 0xcbd5e1, AB: 0x34d399, AO: 0xfb923c, OB: 0xfbbf24 };

function makePoint(color, radius, draggable) {
  const mat = new THREE.MeshStandardMaterial({
    color, roughness: 0.35, metalness: 0.1, emissive: color, emissiveIntensity: 0.25,
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(radius, 32, 24), mat);
  if (draggable) {
    const hit = new THREE.Mesh(
      new THREE.SphereGeometry(0.5, 12, 8),
      new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false }),
    );
    hit.userData.owner = mesh;
    mesh.add(hit);
    mesh.userData.hit = hit;
  }
  scene.add(mesh);
  return mesh;
}

const ptO = makePoint(COLORS.O, 0.13, false);
const ptA = makePoint(COLORS.A, 0.18, true);
const ptB = makePoint(COLORS.B, 0.18, true);
ptA.position.set(...INITIAL.A);
ptB.position.set(...INITIAL.B);
const POINTS = { A: ptA, B: ptB, O: ptO };

// --- sides as cylinders -----------------------------------------------------
const UP = new THREE.Vector3(0, 1, 0);
function makeSide(color, radius) {
  const geo = new THREE.CylinderGeometry(radius, radius, 1, 16, 1, true);
  geo.translate(0, 0.5, 0); // base at origin, length along +Y
  const mat = new THREE.MeshStandardMaterial({
    color, roughness: 0.5, emissive: color, emissiveIntensity: 0.4,
  });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  return mesh;
}
const _dir = new THREE.Vector3();
function updateSide(mesh, from, to) {
  _dir.subVectors(to, from);
  const len = _dir.length();
  mesh.position.copy(from);
  mesh.scale.set(1, Math.max(len, 1e-6), 1);
  if (len > 1e-6) mesh.quaternion.setFromUnitVectors(UP, _dir.divideScalar(len));
}
const sideAB = makeSide(COLORS.AB, 0.045);
const sideAO = makeSide(COLORS.AO, 0.038);
const sideOB = makeSide(COLORS.OB, 0.038);

// translucent triangle fill
const triGeo = new THREE.BufferGeometry();
triGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(9), 3));
const tri = new THREE.Mesh(triGeo, new THREE.MeshBasicMaterial({
  color: 0x93c5fd, transparent: true, opacity: 0.07,
  side: THREE.DoubleSide, depthWrite: false,
}));
scene.add(tri);

// dashed drop-lines to the grid, for depth perception
function makeDropLine() {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
  const line = new THREE.Line(geo, new THREE.LineDashedMaterial({
    color: 0x3b4d68, dashSize: 0.15, gapSize: 0.12, transparent: true, opacity: 0.8,
  }));
  scene.add(line);
  return line;
}
const dropA = makeDropLine();
const dropB = makeDropLine();
function updateDrop(line, p) {
  const pos = line.geometry.attributes.position;
  pos.setXYZ(0, p.x, p.y, p.z);
  pos.setXYZ(1, p.x, 0, p.z);
  pos.needsUpdate = true;
  line.computeLineDistances();
}

// --- HTML labels ------------------------------------------------------------
function makeLabel(cls, text, color) {
  const el = document.createElement('div');
  el.className = cls;
  el.textContent = text;
  if (color) el.style.color = color;
  labelLayer.appendChild(el);
  return el;
}
const labAB = makeLabel('side-label', '', '#34d399');
const labAO = makeLabel('side-label', '', '#fb923c');
const labOB = makeLabel('side-label', '', '#fbbf24');
const labA = makeLabel('point-label', 'A', '#93c5fd');
const labB = makeLabel('point-label', 'B', '#f9a8d4');
const labO = makeLabel('point-label', 'O', '#cbd5e1');

const _proj = new THREE.Vector3();
function placeLabel(el, world, dy = 0) {
  _proj.copy(world).project(camera);
  if (_proj.z > 1) { el.style.display = 'none'; return; }
  el.style.display = '';
  const x = (_proj.x * 0.5 + 0.5) * window.innerWidth;
  const y = (-_proj.y * 0.5 + 0.5) * window.innerHeight + dy;
  el.style.transform = `${el.classList.contains('point-label') ? 'translate(-50%,-100%)' : 'translate(-50%,-50%)'} translate(${x.toFixed(1)}px, ${y.toFixed(1)}px)`;
}

// --- panel ------------------------------------------------------------------
const els = Object.fromEntries(['num-ab', 'num-ao', 'num-ob', 'num-sum', 'seg-ao',
  'seg-ob', 'seg-ab', 'val-detour', 'val-direct', 'slack-text']
  .map((id) => [id, document.getElementById(id)]));

const EPS_EQUAL = 0.04;
const measure = { AO: 0, OB: 0, AB: 0, slack: 0 };

function updateMeasure() {
  measure.AO = ptA.position.length();
  measure.OB = ptB.position.length();
  measure.AB = ptA.position.distanceTo(ptB.position);
  measure.slack = measure.AO + measure.OB - measure.AB;

  const f = (v) => v.toFixed(2);
  els['num-ab'].textContent = f(measure.AB);
  els['num-ao'].textContent = f(measure.AO);
  els['num-ob'].textContent = f(measure.OB);
  els['num-sum'].textContent = f(measure.AO + measure.OB);
  els['val-detour'].textContent = f(measure.AO + measure.OB);
  els['val-direct'].textContent = f(measure.AB);

  const max = Math.max(measure.AO + measure.OB, measure.AB, 1e-6);
  els['seg-ao'].style.width = `${(measure.AO / max) * 100}%`;
  els['seg-ob'].style.width = `${(measure.OB / max) * 100}%`;
  els['seg-ab'].style.width = `${(measure.AB / max) * 100}%`;

  const equal = measure.slack < EPS_EQUAL;
  document.body.classList.toggle('equal', equal);
  els['slack-text'].textContent = equal
    ? 'The detour costs nothing extra — A, O, B are aligned.'
    : `The detour through O costs +${f(measure.slack)} extra.`;
}

// --- dragging ----------------------------------------------------------------
const raycaster = new THREE.Raycaster();
const pointerNDC = new THREE.Vector2();
const dragPlane = new THREE.Plane();
const dragTarget = new THREE.Vector3();
let dragging = null;
let hovered = null;

function setPointerNDC(e) {
  const r = renderer.domElement.getBoundingClientRect();
  pointerNDC.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  pointerNDC.y = -((e.clientY - r.top) / r.height) * 2 + 1;
}
function pickPoint(e) {
  setPointerNDC(e);
  raycaster.setFromCamera(pointerNDC, camera);
  const hits = raycaster.intersectObjects([ptA.userData.hit, ptB.userData.hit], false);
  return hits.length ? hits[0].object.userData.owner : null;
}

renderer.domElement.addEventListener('pointerdown', (e) => {
  const p = pickPoint(e);
  if (!p) return;
  e.stopPropagation();
  dragging = p;
  controls.enabled = false;
  const n = new THREE.Vector3();
  camera.getWorldDirection(n);
  dragPlane.setFromNormalAndCoplanarPoint(n, p.position);
  renderer.domElement.setPointerCapture(e.pointerId);
}, true);

window.addEventListener('pointermove', (e) => {
  if (dragging) {
    setPointerNDC(e);
    raycaster.setFromCamera(pointerNDC, camera);
    if (raycaster.ray.intersectPlane(dragPlane, dragTarget)) {
      dragTarget.clampScalar(-5.5, 5.5);
      dragging.position.copy(dragTarget);
    }
    return;
  }
  const p = pickPoint(e);
  if (p !== hovered) {
    if (hovered) { hovered.scale.setScalar(1); hovered.material.emissiveIntensity = 0.25; }
    hovered = p;
    if (hovered) { hovered.scale.setScalar(1.25); hovered.material.emissiveIntensity = 0.6; }
    renderer.domElement.style.cursor = hovered ? 'grab' : '';
  }
});
window.addEventListener('pointerup', () => {
  if (dragging) flags.dragged = true;
  dragging = null;
  controls.enabled = true;
});

// --- animations (align / reset) -----------------------------------------------
let anims = [];
function animateTo(point, target, dur = 800) {
  anims = anims.filter((a) => a.point !== point);
  anims.push({ point, from: point.position.clone(), to: target.clone(), t0: performance.now(), dur });
}
const easeInOut = (t) => (t < 0.5 ? 4 * t * t * t : 1 - ((-2 * t + 2) ** 3) / 2);
function stepAnims(now) {
  anims = anims.filter((a) => {
    const t = Math.min((now - a.t0) / a.dur, 1);
    a.point.position.lerpVectors(a.from, a.to, easeInOut(t));
    return t < 1;
  });
}

document.getElementById('align').addEventListener('click', () => {
  // place B opposite A through the origin, so O sits on segment AB
  const lenB = Math.max(ptB.position.length(), 0.8);
  const dir = ptA.position.length() > 0.1
    ? ptA.position.clone().normalize()
    : new THREE.Vector3(1, 0.3, 0).normalize();
  animateTo(ptB, dir.multiplyScalar(-lenB));
});
document.getElementById('reset').addEventListener('click', () => {
  animateTo(ptA, new THREE.Vector3(...INITIAL.A));
  animateTo(ptB, new THREE.Vector3(...INITIAL.B));
});

// --- stages -----------------------------------------------------------------------
const flags = { dragged: false };
const ANCHORS = [
  'a direct flight vs one connection through Atlanta',
  'walking to the corner instead of cutting across the grass',
  'a rope looped around a fence post — the loop is longer',
  'hub airport — every route must touch O',
  'collinearity — the detour collapses onto the straight line',
  '',
];
const STAGES = [
  {
    title: 'The direct path',
    copy: 'Two places in space. The <b style="color:#34d399">green segment</b> is the straight route |AB|.',
    task: 'Drag A or B and watch the direct distance change.',
    show: ['ab'],
    enter() { flags.dragged = false; },
    done: () => flags.dragged,
  },
  {
    title: 'A forced detour through O',
    copy: 'Here every trip must pass through <b>O</b> at the origin — a hub. ' +
      'The orange path is A → O → B.',
    task: 'Drag until the detour is clearly longer than the direct path.',
    show: ['ab', 'o', 'detour'],
    enter() { ptO.scale.setScalar(1.6); setTimeout(() => ptO.scale.setScalar(1), 600); },
    done: () => measure.slack > 0.35,
  },
  {
    title: 'Measure it',
    copy: 'The triangle inequality: |AB| ≤ |AO| + |OB|. The detour can never beat the direct path.',
    task: 'Try to make the orange bar shorter than the green — it won\'t happen.',
    show: ['ab', 'o', 'detour', 'measure'],
    done: () => flags.dragged,
  },
  {
    title: 'The extra cost',
    copy: 'Slack = (|AO| + |OB|) − |AB| is the <b>extra</b> distance the detour costs.',
    task: 'Drag until slack is at least 0.5 — feel how much the hub costs.',
    show: ['ab', 'o', 'detour', 'measure', 'slack'],
    done: () => measure.slack >= 0.45,
  },
  {
    title: 'When the detour vanishes',
    copy: 'Equality happens exactly when <b>O lies on segment AB</b> — the detour collapses onto the straight line.',
    task: 'Drag until slack drops below 0.2, as close to equality as you can.',
    show: ['ab', 'o', 'detour', 'measure', 'slack'],
    done: () => measure.slack < 0.2,
  },
  {
    title: 'Playground',
    copy: 'Everything unlocked. Orbit, drag, reset — or <b>Snap to equality</b> to see collinearity.',
    task: null,
    show: ['ab', 'o', 'detour', 'measure', 'slack', 'actions'],
    done: null,
  },
];
let stage = 0;
let taskDone = false;
const shown = new Set();

function applyVisuals() {
  ptO.visible = shown.has('o');
  sideAO.visible = sideOB.visible = shown.has('detour');
  sideAB.visible = shown.has('ab');
  tri.visible = shown.has('detour');
  document.getElementById('block-measure').hidden = !shown.has('measure');
  document.getElementById('block-slack').hidden = !shown.has('slack');
  document.getElementById('block-actions').hidden = !shown.has('actions');
}

function setStage(i) {
  stage = Math.max(0, Math.min(STAGES.length - 1, i));
  const st = STAGES[stage];
  taskDone = false;
  flags.dragged = false;
  st.enter?.();
  shown.clear();
  st.show.forEach((k) => shown.add(k));
  applyVisuals();
  document.getElementById('stage-num').textContent = `${stage + 1} / ${STAGES.length}`;
  document.getElementById('stage-title').textContent = st.title;
  document.getElementById('stage-copy').innerHTML = st.copy;
  document.getElementById('task').style.display = st.task ? '' : 'none';
  if (st.task) document.getElementById('task-text').textContent = st.task;
  document.getElementById('anchor').textContent = ANCHORS[stage] || '';
  document.getElementById('back').disabled = stage === 0;
  document.getElementById('next').style.visibility = stage === STAGES.length - 1 ? 'hidden' : '';
  document.getElementById('skip').style.visibility = stage === STAGES.length - 1 ? 'hidden' : '';
  if (`#${stage}` !== location.hash) history.replaceState(null, '', `#${stage}`);
}
document.getElementById('back').addEventListener('click', () => setStage(stage - 1));
document.getElementById('next').addEventListener('click', () => setStage(stage + 1));
window.addEventListener('hashchange', () => {
  const n = parseInt(location.hash.slice(1), 10);
  if (!Number.isNaN(n) && n !== stage) setStage(n);
});

// --- debug/testing hooks --------------------------------------------------------
window.__viz = {
  screenPos(name) {
    const r = renderer.domElement.getBoundingClientRect();
    const v = POINTS[name].position.clone().project(camera);
    return { x: r.left + (v.x * 0.5 + 0.5) * r.width, y: r.top + (-v.y * 0.5 + 0.5) * r.height };
  },
  state() {
    const f = (v) => +v.toFixed(4);
    return {
      stage, taskDone,
      A: ptA.position.toArray().map(f), B: ptB.position.toArray().map(f),
      AO: f(measure.AO), OB: f(measure.OB), AB: f(measure.AB), slack: f(measure.slack),
      equal: document.body.classList.contains('equal'),
      visible: [...shown],
    };
  },
  setPoint(name, xyz) { POINTS[name].position.set(...xyz); },
  go(i) { setStage(i); },
};

// --- main loop --------------------------------------------------------------------
const mid = new THREE.Vector3();
function tick(now) {
  requestAnimationFrame(tick);
  stepAnims(now);
  controls.update();

  updateSide(sideAB, ptA.position, ptB.position);
  updateSide(sideAO, ptA.position, ptO.position);
  updateSide(sideOB, ptO.position, ptB.position);
  updateDrop(dropA, ptA.position);
  updateDrop(dropB, ptB.position);

  const tp = tri.geometry.attributes.position;
  tp.setXYZ(0, ptO.position.x, ptO.position.y, ptO.position.z);
  tp.setXYZ(1, ptA.position.x, ptA.position.y, ptA.position.z);
  tp.setXYZ(2, ptB.position.x, ptB.position.y, ptB.position.z);
  tp.needsUpdate = true;

  updateMeasure();

  const st = STAGES[stage];
  if (!taskDone && st.done && st.done()) taskDone = true;
  document.getElementById('task').classList.toggle('done', taskDone);
  document.getElementById('task-tick').textContent = taskDone ? '✓' : '○';
  document.getElementById('next').classList.toggle('glow', taskDone);

  labAB.textContent = measure.AB.toFixed(2);
  labAO.textContent = measure.AO.toFixed(2);
  labOB.textContent = measure.OB.toFixed(2);
  if (shown.has('ab')) placeLabel(labAB, mid.lerpVectors(ptA.position, ptB.position, 0.5), -14);
  else labAB.style.display = 'none';
  if (shown.has('detour')) {
    placeLabel(labAO, mid.lerpVectors(ptA.position, ptO.position, 0.5), -14);
    placeLabel(labOB, mid.lerpVectors(ptO.position, ptB.position, 0.5), -14);
  } else { labAO.style.display = 'none'; labOB.style.display = 'none'; }
  placeLabel(labA, ptA.position, -16);
  placeLabel(labB, ptB.position, -16);
  if (shown.has('o')) placeLabel(labO, ptO.position, -14);
  else labO.style.display = 'none';

  renderer.render(scene, camera);
}
const initial = parseInt(location.hash.slice(1), 10);
setStage(Number.isNaN(initial) ? 0 : initial);
requestAnimationFrame(tick);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
